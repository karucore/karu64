# yaml-language-server: $schema=https://raw.githubusercontent.com/riscv/riscv-unified-db/main/spec/schemas/config_schema.json
---
$schema: config_schema.json#
kind: architecture configuration
type: fully configured
name: karu64-rv64gc
description: |
  karu64 soft-core, RV64GC (RV64IMAFDC) + Zicsr/Zicntr/Zifencei, M-mode only.
  Derived from the vetted sail-RVI20U64 config (identical RV64GC M-mode
  extension set + HTIF). Vector (V/Zve*/Zvl*) is added as the RVV work lands.
implemented_extensions:
  - { name: I, version: "= 2.1" }
  - { name: M, version: "= 2.0" }
  - { name: A, version: "= 2.1.0" }
  - { name: F, version: "= 2.2.0" }
  - { name: D, version: "= 2.2.0" }
  # Zfhmin: claimed only so the ACT4 selector picks the Vf32/Vf64 vector-FP
  # slices (their REQUIRED_EXTENSIONS gate on it). karu64 does NOT implement
  # half-precision; the SEW32/SEW64 test bodies emit no fp16 instructions, so
  # any test that actually executes an fp16 op will (correctly) trap on karu64.
  - { name: Zfhmin, version: "= 1.0.0" }
  - { name: C, version: "= 2.0" }
  - { name: Zicntr, version: "= 2.0" }
  # - { name: Zihpm, version: "= 2.0" } # TODO: Disabled because hpmcounter CSRs are not accessible without U mode. See https://github.com/riscv/sail-riscv/pull/1649.
  - { name: Zicsr, version: "= 2.0" }
  - { name: Zifencei, version: "= 2.0.0" }
  - { name: Zaamo, version: "= 1.0.0" }
  - { name: Zalrsc, version: "= 1.0.0" }
  #	Vector subset WITH floating-point: Zve32f (FP32 vectors) + Zve64d
  #	(FP64 vectors) pull in the full integer-vector set (Zve32x/Zve64x) and
  #	the vector-FP instructions, so ACT4 generates the Vf slices too.
  - { name: Zve32x, version: "= 1.0.0" }
  - { name: Zve64x, version: "= 1.0.0" }
  - { name: Zve32f, version: "= 1.0.0" }
  - { name: Zve64f, version: "= 1.0.0" }
  - { name: Zve64d, version: "= 1.0.0" }
  - { name: Zvl32b, version: "= 1.0.0" }
  - { name: Zvl64b, version: "= 1.0.0" }
  - { name: Zvl128b, version: "= 1.0.0" }
  - { name: Zvl256b, version: "= 1.0.0" }
  - { name: Zca, version: "= 1.0.0" }
  - { name: Zcd, version: "= 1.0.0" }
  - { name: Sm, version: "= 1.12.0" }

params:
  # A params
  MISALIGNED_AMO: false
  LRSC_RESERVATION_STRATEGY: "reserve exactly enough to cover the access" # XLEN size reservation
  LRSC_FAIL_ON_VA_SYNONYM: false
  LRSC_MISALIGNED_BEHAVIOR: "always raise access fault"
  LRSC_FAIL_ON_NON_EXACT_LRSC: false
  MUTABLE_MISA_A: false
  # M params
  MUTABLE_MISA_M: false
  # F params
  MUTABLE_MISA_F: false
  HW_MSTATUS_FS_DIRTY_UPDATE: precise
  MSTATUS_FS_LEGAL_VALUES: [0, 1, 2, 3]
  # D params
  MUTABLE_MISA_D: false
  # C params
  MUTABLE_MISA_C: false
  # V (vector integer) params
  VLEN: 256
  ELEN: 64
  SEW_MIN: 8
  FOLLOW_VTYPE_RESET_RECOMMENDATION: true
  HW_MSTATUS_VS_DIRTY_UPDATE: precise
  RVV_VL_WHEN_AVL_LT_DOUBLE_VLMAX: VLMAX
  SUPPORT_FRACTIONAL_LMUL_BEYOND_REQUIRED: "no_unrequired_supported"
  VILL_SET_ON_RESERVED_VTYPE: true
  RESERVED_VSET_X0X0_VILL_SET: "always"
  RESERVED_VSET_X0X0_VLMAX_CHANGE: "always"
  VECTOR_LS_INDEX_MAX_EEW: "XLEN"
  VECTOR_FF_UPDATE_PAST_TRIM: "update_none"
  VECTOR_FF_SEG_EXCEPTION_PARTIAL_LOAD: "no_subsegment_loaded"
  VECTOR_LS_MISALIGNED_LEGAL: false
  VECTOR_LOAD_PAST_TRAP: false
  VECTOR_LOAD_SEG_FF_OVERWRITE_ELEMENTS_AFTER_FAULT: "no_overwrite"
  VECTOR_LS_SEG_PARTIAL_ACCESS: false
  LEGAL_VSTART: "1_stride"
  VECTOR_LS_WHOLEREG_MISALIGNED_LEGAL: false
  VECTOR_FF_NO_EXCEPTION_TRIM: false
  MSTATUS_VS_LEGAL_VALUES: [0, 1, 2, 3]
  VSSTATUS_VS_EXISTS: false
  IMPRECISE_VECTOR_TRAP_SETTABLE: false
  # FP-reduction behaviours (required by the schema even for Zve*x integer)
  VFREDUSUM_NAN: "no_change"
  VFREDUSUM_NODE_ROUNDING_BEHAVIOR: "SEW_precision"
  VFREDUSUM_INACTIVE_NODE_ELEMENT_BEHAVIOR: "additive_identity"
  VFREDUSUM_FINAL_NODE_ELEMENT_BEHAVIOR: "additive_identity"
  # Zicntr params
  # karu64 maps the `time` CSR (0xC01) to its cycle counter as a proxy, not a
  # real CLINT mtime, so it can't match the reference's mtime — disable the
  # time-CSR tests. cycle/instret are real and stay enabled.
  TIME_CSR_IMPLEMENTED: false
  # (COUNTINHIBIT_EN is now definedBy extension Sm directly in udb-0.1.9;
  # the old MCOUNTINHIBIT_IMPLEMENTED param was removed from the schema.)
  # Sm params
  MXLEN: 64
  PRECISE_SYNCHRONOUS_EXCEPTIONS: true
  TRAP_ON_ECALL_FROM_M: true
  TRAP_ON_EBREAK: true
  MARCHID_IMPLEMENTED: true
  ARCH_ID_VALUE: 0x1
  MIMPID_IMPLEMENTED: true
  IMP_ID_VALUE: 0x0
  VENDOR_ID_BANK: 0x0
  VENDOR_ID_OFFSET: 0x0
  MISALIGNED_LDST: true
  MISALIGNED_LDST_EXCEPTION_PRIORITY: low
  MISALIGNED_MAX_ATOMICITY_GRANULE_SIZE: 4096
  MISALIGNED_SPLIT_STRATEGY: sequential_bytes
  TRAP_ON_ILLEGAL_WLRL: false
  TRAP_ON_UNIMPLEMENTED_INSTRUCTION: true
  TRAP_ON_RESERVED_INSTRUCTION: true
  TRAP_ON_UNIMPLEMENTED_CSR: true
  REPORT_VA_IN_MTVAL_ON_BREAKPOINT: true
  REPORT_VA_IN_MTVAL_ON_LOAD_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_MISALIGNED: true
  REPORT_VA_IN_MTVAL_ON_LOAD_ACCESS_FAULT: true
  REPORT_VA_IN_MTVAL_ON_STORE_AMO_ACCESS_FAULT: true
  REPORT_VA_IN_MTVAL_ON_INSTRUCTION_ACCESS_FAULT: true
  REPORT_ENCODING_IN_MTVAL_ON_ILLEGAL_INSTRUCTION: true
  MTVAL_WIDTH: 64
  CONFIG_PTR_ADDRESS: 0
  PMA_GRANULARITY: 3
  PHYS_ADDR_WIDTH: 57
  M_MODE_ENDIANNESS: little
  MISA_CSR_IMPLEMENTED: true
  MTVEC_ACCESS: rw
  MTVEC_MODES: [0, 1]
  MTVEC_BASE_ALIGNMENT_DIRECT: 4
  MTVEC_BASE_ALIGNMENT_VECTORED: 4
  MTVEC_ILLEGAL_WRITE_BEHAVIOR: retain
  NUM_PMP_ENTRIES: 0
  HPM_COUNTER_EN:
    [
      false,
