# LiteEth standalone core config for karu64 (sim/loopback bring-up, Phase E0/E1).
#
# - core: wishbone  -> the LiteX MAC the upstream Linux `liteeth` driver binds.
# - phy : LiteEthPHYMII -> a stock, vendor-neutral PHY; in sim the MII pads are
#   looped TX->RX by flow/fpga/eth/eth_mii_loopback.v (no GTH/PHY needed).
# - addresses are relocated into karu64's eth MMIO window (0x1100_0000) so a
#   single is_eth() decode in the xbar covers CSRs + slot SRAM.
phy        : LiteEthPHYMII
vendor     : xilinx
# device/toolchain let the LiteX XilinxPlatform fill the -part on the generated
# synth_design line in the standalone liteeth_core.tcl; harmless for the MII sim
# core, and keeps the build script complete + consistent with liteeth_gmii.yml.
device     : xcvu9p-flga2104-2L-e
toolchain  : vivado
core       : wishbone
clk_freq   : 75e6
endianness : little
nrxslots   : 2
ntxslots   : 2
# byte-granular slot-SRAM writes: memcpy_toio() emits byte stores for the
# unaligned frame tail, so the buffer must honour per-byte write enables.
full_memory_we : True
soc:
    mem_map:
        csr    : 0x11000000
        ethmac : 0x11010000
